<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="Vet Tx Handbook — mobile veterinary treatment reference.">
  <title>Vet Tx Handbook</title>
  <script src="config.js"></script>
  <style>
    :root{--ink:#07111f;--navy:#0b1f3a;--text:#172b49;--muted:#687990;--line:#dce6f3;--soft:#f3f7fc;--blue:#1769ff;--cyan:#00b8d9;--danger:#c62828;--header:62px;--banner:112px;--bottom:70px;--shadow:0 12px 36px rgba(9,31,68,.11)}
    *{box-sizing:border-box}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}body{margin:0;min-height:100dvh;padding-bottom:calc(var(--bottom) + env(safe-area-inset-bottom));overflow-x:hidden;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#edf5ff,#f9fbff 42%,#eef4fb)}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}img{display:block;max-width:100%}
    .header{position:fixed;z-index:50;inset:0 0 auto;height:var(--header);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:0 14px;background:rgba(5,16,31,.97);border-bottom:1px solid rgba(255,255,255,.12);color:#fff;backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:40px;height:40px;flex:0 0 auto;border:1px solid rgba(104,221,255,.65);border-radius:12px;display:grid;place-items:center;background:linear-gradient(145deg,rgba(0,184,217,.2),rgba(23,105,255,.25));font-weight:950;color:#7eeaff}.brand-title{font-size:clamp(16px,4.4vw,22px);font-weight:900;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand-sub{font-size:11px;color:#a9bbd2}.icon-btn{width:44px;height:44px;border-radius:13px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer}
    .banner{position:fixed;z-index:40;top:var(--header);left:0;right:0;height:var(--banner);overflow:hidden;background:linear-gradient(120deg,#071a32,#0b4f91 62%,#00a5c6);border-bottom:1px solid rgba(11,48,91,.18);box-shadow:0 8px 28px rgba(8,33,70,.14)}.banner:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(3,14,28,.65),rgba(3,14,28,.1) 60%,rgba(3,14,28,.35));pointer-events:none}.banner img{width:100%;height:100%;object-fit:cover}.banner-copy{position:absolute;z-index:2;left:16px;right:16px;bottom:12px;color:#fff}.banner-copy h1{margin:0;font-size:clamp(20px,5vw,34px);line-height:1.05;font-weight:950;letter-spacing:-.045em;text-shadow:0 2px 14px rgba(0,0,0,.35)}.banner-copy p{margin:4px 0 0;font-size:clamp(11px,2.8vw,14px);font-weight:650;color:#e1f8ff}
    main{max-width:1380px;margin:0 auto;padding:calc(var(--header) + var(--banner) + 14px) 12px 28px}.search{position:sticky;z-index:30;top:calc(var(--header) + var(--banner) + 7px);display:flex;align-items:center;gap:9px;padding:10px 12px;background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(8,36,79,.1);backdrop-filter:blur(14px)}.search input{flex:1;min-width:0;height:34px;border:0;outline:0;background:transparent;font-size:16px;color:var(--text)}.clear{display:none;width:36px;height:36px;border:0;border-radius:50%;background:#eaf1fb;color:var(--navy);cursor:pointer}.clear.show{display:grid;place-items:center}
    .head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:20px 2px 11px}.head h2{margin:0;color:var(--ink);font-size:clamp(20px,4vw,28px);font-weight:950;letter-spacing:-.04em}.meta{color:var(--muted);font-size:12px;font-weight:750;text-align:right}.categories{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.category{min-height:136px;padding:0;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:#fff;text-align:left;cursor:pointer;box-shadow:0 7px 22px rgba(8,36,79,.07);transition:.16s}.category:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.category.active{border:2px solid var(--blue);box-shadow:0 10px 30px rgba(23,105,255,.2)}.category-media{height:82px;display:grid;place-items:center;overflow:hidden;background:linear-gradient(145deg,#e9f4ff,#f7fbff)}.category-media img{width:100%;height:100%;object-fit:cover}.initials{font-size:28px;font-weight:950;color:var(--blue)}.category-name{padding:9px 10px 11px;color:var(--navy);font-size:13px;line-height:1.23;font-weight:850}.count{display:block;margin-top:3px;color:var(--muted);font-size:11px;font-weight:650}
    .protocols{display:grid;grid-template-columns:1fr;gap:13px}.card{display:grid;gap:12px;padding:14px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 25px rgba(8,36,79,.07)}.media{width:100%;aspect-ratio:16/10;overflow:hidden;border:1px solid var(--line);border-radius:14px;background:var(--soft)}.media img{width:100%;height:100%;object-fit:contain;background:#fff}.title{margin:0;color:var(--ink);font-size:18px;line-height:1.25;font-weight:900}.desc{margin:7px 0 0;color:#465b76;font-size:13.5px;line-height:1.5}.tags{margin-top:8px;color:var(--muted);font-size:12px;line-height:1.4}.pill{display:inline-flex;margin-top:8px;padding:4px 9px;border:1px solid #c9dcff;border-radius:999px;background:#edf5ff;color:#0b4bd4;font-size:11px;font-weight:800}.view{height:48px;border:0;border-radius:13px;background:linear-gradient(135deg,var(--blue),#338aff);color:#fff;font-weight:900;cursor:pointer;box-shadow:0 7px 18px rgba(23,105,255,.22)}.empty{grid-column:1/-1;padding:30px;border:1px dashed #acc5e8;border-radius:20px;background:rgba(255,255,255,.8);text-align:center;color:var(--muted);font-weight:700}.error{max-width:700px;margin:20px auto;padding:20px;border:1px solid #efc6c6;border-radius:20px;background:#fff;box-shadow:var(--shadow)}.error h2{margin:0 0 8px;color:var(--danger)}.error p{color:#53657c;line-height:1.55}.error code{display:block;margin-top:10px;padding:12px;border-radius:12px;background:#081729;color:#d9efff;overflow-wrap:anywhere}mark{padding:0 2px;border-radius:3px;background:#fff1a8}
    .bottom{position:fixed;z-index:70;left:0;right:0;bottom:0;height:calc(var(--bottom) + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:7px 12px calc(7px + env(safe-area-inset-bottom));background:rgba(6,17,32,.97);border-top:1px solid rgba(255,255,255,.12);box-shadow:0 -10px 32px rgba(4,15,32,.18);backdrop-filter:blur(18px)}.nav{height:54px;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:rgba(255,255,255,.07);color:#d7e8ff;font-size:12px;font-weight:850;cursor:pointer}.nav.home{border-color:transparent;background:linear-gradient(135deg,#075a8a,#0b6ef3);color:#fff}.nav span{display:block;font-size:18px;line-height:1.1}
    .loading{display:none;position:fixed;z-index:100;inset:0;align-items:center;justify-content:center;padding:20px;background:rgba(2,10,22,.64);backdrop-filter:blur(6px)}.loading.show{display:flex}.loading-card{width:min(360px,100%);padding:24px;border:1px solid var(--line);border-radius:22px;background:#fff;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.32)}.spinner{width:48px;height:48px;margin:0 auto 13px;border:4px solid #dbe9fb;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}.loading-title{font-size:18px;font-weight:950;color:var(--ink)}.loading-text{margin-top:5px;color:var(--muted);font-size:13px;line-height:1.45}@keyframes spin{to{transform:rotate(360deg)}}
    .modal-bg{display:none;position:fixed;z-index:90;inset:0;padding:6px;overflow:auto;background:rgba(2,8,17,.86)}.modal-bg.show{display:grid;place-items:center}.modal{width:min(1080px,100%);overflow:hidden;border:1px solid rgba(255,255,255,.15);border-radius:18px;background:#07111f;box-shadow:0 35px 100px rgba(0,0,0,.55)}.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:13px 14px;color:#fff;border-bottom:1px solid rgba(255,255,255,.12)}.modal-title{font-size:15px;line-height:1.35;font-weight:900}.close{width:44px;height:44px;border:0;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;font-size:22px;cursor:pointer}.image-wrap{min-height:240px;max-height:76dvh;overflow:auto;display:grid;place-items:center;background:#020711}.modal-image{max-width:100%;height:auto;object-fit:contain;transition:transform .2s;transform-origin:center}.modal-image.zoom{transform:scale(2);cursor:zoom-out}.modal-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:10px 14px;color:#afc4dd;font-size:12px}.action{height:38px;padding:0 13px;border:1px solid rgba(255,255,255,.16);border-radius:10px;background:rgba(255,255,255,.08);color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
    .toast{position:fixed;z-index:110;left:50%;bottom:calc(var(--bottom) + 16px + env(safe-area-inset-bottom));max-width:min(92vw,440px);padding:12px 16px;border-radius:13px;background:#07182f;color:#fff;font-size:13px;font-weight:800;text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.3);opacity:0;pointer-events:none;transform:translateX(-50%) translateY(12px);transition:.18s}.toast.show{opacity:1;transform:translateX(-50%)}
    @media(min-width:700px){:root{--header:64px;--banner:136px}.categories{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}.category{min-height:150px}.category-media{height:96px}.protocols{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}main{padding-left:18px;padding-right:18px}.banner-copy{left:max(18px,calc((100vw - 1380px)/2 + 18px))}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <header class="header"><div class="brand"><div class="logo">VT</div><div><div class="brand-title">Vet Tx Handbook</div><div class="brand-sub">by Dr. Ankit Malik</div></div></div><button class="icon-btn" id="refresh" aria-label="Refresh">↻</button></header>
  <section class="banner"><img id="bannerImage" alt="Application banner" hidden><div class="banner-copy" id="bannerCopy"><h1>Veterinary Treatment Protocols</h1><p>Organ-system-wise mobile clinical reference</p></div></section>
  <main><div class="search"><span>⌕</span><input id="search" type="search" placeholder="Search disease, treatment, drug or organ system…" autocomplete="off"><button class="clear" id="clear" aria-label="Clear">×</button></div><section><div class="head"><h2>Organ Systems</h2><div class="meta" id="categoryMeta">Loading…</div></div><div class="categories" id="categories"></div></section><section id="protocolSection"><div class="head"><h2 id="protocolHeading">Treatment Protocols</h2><div class="meta" id="protocolMeta"></div></div><div class="protocols" id="protocols"></div></section></main>
  <nav class="bottom" aria-label="Navigation"><button class="nav" id="back"><span>←</span>Back</button><button class="nav home" id="home"><span>⌂</span>Home</button><button class="nav" id="forward"><span>→</span>Forward</button></nav>
  <div class="loading show" id="loading"><div class="loading-card"><div class="spinner"></div><div class="loading-title" id="loadingTitle">Loading library</div><div class="loading-text" id="loadingText">Please wait while published data is loaded…</div></div></div>
  <div class="modal-bg" id="modal"><div class="modal"><div class="modal-head"><div class="modal-title" id="modalTitle"></div><button class="close" id="modalClose">×</button></div><div class="image-wrap" id="imageWrap"><img class="modal-image" id="modalImage" alt="Treatment protocol"></div><div class="modal-foot"><span>Tap image to zoom</span><div><button class="action" id="zoom">Zoom</button> <a class="action" id="full" target="_blank" rel="noopener">Full size</a></div></div></div></div>
  <div class="toast" id="toast"></div>
  <script>
    const $=id=>document.getElementById(id),els={refresh:$('refresh'),search:$('search'),clear:$('clear'),categories:$('categories'),protocols:$('protocols'),categoryMeta:$('categoryMeta'),protocolMeta:$('protocolMeta'),protocolHeading:$('protocolHeading'),bannerImage:$('bannerImage'),bannerCopy:$('bannerCopy'),loading:$('loading'),loadingTitle:$('loadingTitle'),loadingText:$('loadingText'),modal:$('modal'),modalTitle:$('modalTitle'),modalClose:$('modalClose'),modalImage:$('modalImage'),imageWrap:$('imageWrap'),zoom:$('zoom'),full:$('full'),toast:$('toast'),back:$('back'),home:$('home'),forward:$('forward')};
    const state={categories:[],protocols:[],selected:'',query:''};
    const api=()=>String((window.VET_TX_CONFIG||{}).API_URL||'').trim().replace(/\/$/,'');
    const valid=()=>/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/i.test(api());
    const endpoint=()=>api()+'?api=public';
    const showLoad=(t,x)=>{els.loadingTitle.textContent=t||'Please wait';els.loadingText.textContent=x||'Processing…';els.loading.classList.add('show')};
    const hideLoad=()=>els.loading.classList.remove('show');
    const toast=x=>{els.toast.textContent=x;els.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>els.toast.classList.remove('show'),2400)};
    const esc=v=>String(v||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));
    const attr=v=>esc(v).replace(/'/g,'&#39;');
    const initials=v=>String(v||'OS').trim().split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();
    const hi=url=>String(url||'').replace(/([?&])sz=w\d+/,'$1sz=w2400');
    const drive=p=>p.driveFileId?'https://drive.google.com/file/d/'+p.driveFileId+'/view':p.imageUrl||'#';
    const highlight=(text,q)=>{if(!q)return esc(text);const s=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(text).replace(new RegExp(s,'gi'),m=>'<mark>'+m+'</mark>')};
    function load(){if(!valid()){hideLoad();els.categoryMeta.textContent='Configuration required';els.categories.innerHTML='<div class="error"><h2>Connect Apps Script</h2><p>Paste the deployed public <strong>/exec</strong> URL in <strong>config.js</strong>.</p><code>window.VET_TX_CONFIG = { API_URL: \'https://script.google.com/macros/s/.../exec\' };</code></div>';return}showLoad('Loading library','Reading published protocols, organ thumbnails and banner from Google Sheet…');const cb='vetTx_'+Date.now(),s=document.createElement('script');let timer;window[cb]=data=>{clearTimeout(timer);delete window[cb];s.remove();if(!data||data.ok===false)return fail((data&&data.error)||'Invalid response');apply(data)};s.onerror=()=>{clearTimeout(timer);delete window[cb];s.remove();fail('Could not connect to Apps Script.')};s.src=endpoint()+'&callback='+encodeURIComponent(cb)+'&_='+Date.now();document.head.appendChild(s);timer=setTimeout(()=>{if(window[cb]){delete window[cb];s.remove();fail('The server took too long to respond.')}},25000)}
    function fail(message){hideLoad();els.categoryMeta.textContent='Connection failed';els.categories.innerHTML='<div class="error"><h2>Library unavailable</h2><p>'+esc(message)+'</p><p>Confirm Apps Script deployment access is set to <strong>Anyone</strong>.</p></div>';els.protocols.innerHTML=''}
    function apply(data){state.categories=Array.isArray(data.categories)?data.categories:[];state.protocols=Array.isArray(data.protocols)?data.protocols:[];state.selected=state.categories.find(c=>state.protocols.some(p=>p.organSystem===c.name))?.name||state.categories[0]?.name||'';const b=data.banner||{},src=b.thumbnailUrl||b.imageUrl||'';if(src){els.bannerImage.src=src;els.bannerImage.hidden=false;els.bannerCopy.hidden=false;els.bannerImage.onerror=()=>els.bannerImage.hidden=true}else{els.bannerImage.hidden=true}renderCategories();renderProtocols();hideLoad();toast(state.protocols.length+' published protocols loaded')}
    function renderCategories(){const q=state.query.trim();els.categoryMeta.textContent=state.categories.length+' systems';els.categories.innerHTML=state.categories.map(c=>{const n=state.protocols.filter(p=>p.organSystem===c.name).length,m=c.thumbnailUrl?'<img src="'+attr(c.thumbnailUrl)+'" alt="'+attr(c.name)+'" loading="lazy">':'<span class="initials">'+esc(initials(c.name))+'</span>';return '<button class="category '+(!q&&c.name===state.selected?'active':'')+'" data-cat="'+attr(c.name)+'"><div class="category-media">'+m+'</div><div class="category-name">'+esc(c.name)+'<span class="count">'+n+' protocol'+(n===1?'':'s')+'</span></div></button>'}).join('')||'<div class="empty">No organ systems available.</div>';document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>selectCategory(b.dataset.cat))}
    function selectCategory(name){showLoad('Opening '+name,'Preparing organ-system protocols…');state.selected=name;state.query='';els.search.value='';els.clear.classList.remove('show');history.pushState({category:name},'',location.pathname+location.search+'#'+encodeURIComponent(name));requestAnimationFrame(()=>{renderCategories();renderProtocols();$('protocolSection').scrollIntoView({behavior:'smooth'});setTimeout(hideLoad,180)})}
    function list(){const q=state.query.trim().toLowerCase();return state.protocols.filter(p=>q?[p.title,p.description,p.tags,p.organSystem].join(' ').toLowerCase().includes(q):(!state.selected||p.organSystem===state.selected)).sort((a,b)=>String(a.title).localeCompare(String(b.title)))}
    function renderProtocols(){const rows=list(),q=state.query.trim();els.protocolHeading.textContent=q?'Search Results':(state.selected||'Treatment Protocols');els.protocolMeta.textContent=rows.length+' result'+(rows.length===1?'':'s');els.protocols.innerHTML=rows.map(p=>'<article class="card"><div class="media"><img src="'+attr(p.thumbnailUrl||p.imageUrl)+'" alt="'+attr(p.title)+'" loading="lazy"></div><div><h3 class="title">'+highlight(p.title,q)+'</h3><p class="desc">'+highlight(p.description,q)+'</p>'+(p.tags?'<div class="tags">'+highlight(p.tags,q)+'</div>':'')+(q?'<span class="pill">'+esc(p.organSystem)+'</span>':'')+'</div><button class="view" data-view="'+attr(p.id)+'">View Protocol</button></article>').join('')||'<div class="empty">'+(q?'No matching protocol found.':'No published protocols in this organ system.')+'</div>';document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>openPreview(state.protocols.find(p=>p.id===b.dataset.view)))}
    function openPreview(p){if(!p)return;showLoad('Opening protocol','Loading the high-resolution image…');els.modalTitle.textContent=p.title;els.modalImage.classList.remove('zoom');els.zoom.textContent='Zoom';els.full.href=drive(p);els.modalImage.onload=()=>{hideLoad();els.modal.classList.add('show');document.body.style.overflow='hidden'};els.modalImage.onerror=()=>{hideLoad();els.modal.classList.add('show');toast('Image could not be loaded. Use Full size. was opened.')};els.modalImage.src=hi(p.thumbnailUrl)||p.imageUrl||p.thumbnailUrl}
    function closeModal(){els.modal.classList.remove('show');document.body.style.overflow='';els.modalImage.classList.remove('zoom')}
    function goHome(){showLoad('Going home','Resetting filters…');state.query='';els.search.value='';els.clear.classList.remove('show');state.selected=state.categories.find(c=>state.protocols.some(p=>p.organSystem===c.name))?.name||state.categories[0]?.name||'';history.pushState({home:true},'',location.pathname+location.search);requestAnimationFrame(()=>{renderCategories();renderProtocols();window.scrollTo({top:0,behavior:'smooth'});setTimeout(hideLoad,180)})}
    let timer;els.search.oninput=()=>{clearTimeout(timer);const v=els.search.value;els.clear.classList.toggle('show',!!v);timer=setTimeout(()=>{state.query=v;renderCategories();renderProtocols()},160)};els.clear.onclick=()=>{els.search.value='';state.query='';els.clear.classList.remove('show');renderCategories();renderProtocols();els.search.focus()};els.refresh.onclick=load;els.home.onclick=goHome;els.back.onclick=()=>{showLoad('Going back','Restoring previous screen…');history.back();setTimeout(hideLoad,1200)};els.forward.onclick=()=>{showLoad('Going forward','Restoring next screen…');history.forward();setTimeout(hideLoad,1200)};window.onpopstate=()=>{const h=decodeURIComponent(location.hash.slice(1));if(h&&state.categories.some(c=>c.name===h))state.selected=h;renderCategories();renderProtocols();hideLoad()};els.modalClose.onclick=closeModal;els.modal.onclick=e=>{if(e.target===els.modal)closeModal()};els.imageWrap.onclick=()=>{els.modalImage.classList.toggle('zoom');els.zoom.textContent=els.modalImage.classList.contains('zoom')?'Reset':'Zoom'};els.zoom.onclick=()=>els.imageWrap.click();document.onkeydown=e=>{if(e.key==='Escape')closeModal()};load();
  </script>
</body>
</html>
