<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#03101d">
  <title>Vet Tx Handbook</title>
  <script src="config.js"></script>
  <style>
    :root{--bg:#03101d;--panel:#071a2b;--panel2:#0a2136;--cyan:#20d8ff;--blue:#1479ff;--orange:#ff9b35;--text:#f7fbff;--muted:#9fb2c7;--line:rgba(54,207,255,.3);--header:64px;--bottom:68px}
    *{box-sizing:border-box}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}body{margin:0;min-height:100dvh;padding:calc(var(--header) + env(safe-area-inset-top)) 0 calc(var(--bottom) + env(safe-area-inset-bottom));overflow-x:hidden;font-family:Inter,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#020b14,#031524 48%,#020d18)}button,input{font:inherit}button{-webkit-tap-highlight-color:transparent}img{display:block;max-width:100%}
    .topbar{position:fixed;z-index:60;inset:0 0 auto;height:calc(var(--header) + env(safe-area-inset-top));padding:env(safe-area-inset-top) 10px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(2,12,22,.98);border-bottom:1px solid rgba(68,205,255,.22);backdrop-filter:blur(16px)}.brand{display:flex;align-items:center;gap:9px;min-width:0}.logo{width:42px;height:42px;flex:0 0 auto;border:1px solid var(--cyan);border-radius:13px;display:grid;place-items:center;background:linear-gradient(145deg,rgba(32,216,255,.14),rgba(20,121,255,.18));color:#6be9ff;font-size:19px;font-weight:950}.brand-title{font-size:clamp(17px,4.6vw,22px);font-weight:920;letter-spacing:-.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand-sub{color:#b8c7d8;font-size:11px}.top-actions{display:flex;gap:7px}.icon-btn{width:42px;height:42px;border:1px solid rgba(70,205,255,.36);border-radius:50%;display:grid;place-items:center;background:#081b2c;color:#dff9ff;font-size:19px;cursor:pointer}
    main{width:min(1100px,100%);margin:0 auto;padding:10px 10px 24px}.hero{position:relative;overflow:hidden;height:112px;border:1px solid var(--line);border-radius:15px;background:linear-gradient(120deg,#073453,#075478)}.hero img{width:100%;height:100%;object-fit:cover}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(1,11,19,.12),rgba(1,11,19,.28) 45%,rgba(1,11,19,.86))}.hero-copy{position:absolute;z-index:2;right:12px;top:50%;width:46%;transform:translateY(-50%)}.hero-copy h1{margin:0;font-size:clamp(16px,4vw,25px);line-height:1.08;letter-spacing:-.04em}.hero-copy p{margin:6px 0 0;color:#ccefff;font-size:10.5px;line-height:1.35}.hero.no-image .hero-copy{left:14px;right:14px;width:auto}.hero.no-image:after{background:linear-gradient(120deg,rgba(1,12,23,.1),rgba(1,12,23,.65))}
    .search{margin:10px 0 13px;display:flex;align-items:center;gap:9px;height:48px;padding:0 12px;border:1px solid rgba(100,203,255,.3);border-radius:15px;background:rgba(8,27,44,.96)}.search input{flex:1;min-width:0;border:0;outline:0;background:transparent;color:#fff;font-size:16px}.search input::placeholder{color:#8399af}.clear{display:none;width:34px;height:34px;border:0;border-radius:50%;background:#11324f;color:#fff}.clear.show{display:grid;place-items:center}
    .section{margin-top:14px}.section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 1px 8px}.section-title{display:flex;align-items:center;gap:7px;margin:0;color:var(--cyan);font-size:18px;font-weight:900;letter-spacing:-.03em}.section-title.orange{color:var(--orange)}.section-meta{color:#8ba0b5;font-size:11px;font-weight:760}.tiles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.tile{position:relative;min-height:112px;padding:6px 6px 22px;border:1px solid var(--line);border-radius:13px;background:linear-gradient(160deg,#082338,#041422);color:#fff;cursor:pointer}.tile.active{border:2px solid var(--cyan)}.tile-media{height:64px;display:grid;place-items:center;overflow:hidden;border-radius:9px;background:radial-gradient(circle,rgba(37,187,255,.12),transparent 65%)}.tile-media img{width:100%;height:100%;object-fit:contain}.initials{font-size:24px;font-weight:950;color:#53dcff}.tile-name{margin-top:5px;font-size:11.5px;line-height:1.12;text-align:center;font-weight:820}.tile-count{position:absolute;right:5px;bottom:5px;min-width:22px;height:22px;padding:0 6px;border:1px solid rgba(61,199,255,.25);border-radius:999px;display:grid;place-items:center;background:#062645;color:#bcecff;font-size:9px;font-weight:850}.folders{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.folder{min-height:60px;padding:8px;border:1px solid rgba(255,155,53,.34);border-radius:13px;display:flex;align-items:center;gap:8px;background:linear-gradient(145deg,rgba(45,29,12,.5),#071928);color:#fff}.folder-thumb{width:40px;height:40px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;overflow:hidden;background:rgba(255,155,53,.09)}.folder-thumb img{width:100%;height:100%;object-fit:contain}.folder-name{font-size:12px;line-height:1.15;font-weight:820}.folder-count{margin-left:auto;color:#ffc076;font-size:10px;font-weight:850}
    .protocols{display:grid;grid-template-columns:1fr;gap:9px}.card{display:grid;grid-template-columns:72px minmax(0,1fr);gap:10px;padding:9px;border:1px solid rgba(72,183,236,.24);border-radius:14px;background:linear-gradient(145deg,#071c2d,#061522)}.card-media{width:72px;height:72px;overflow:hidden;border-radius:10px;background:#fff}.card-media img{width:100%;height:100%;object-fit:contain}.card-title{margin:0;font-size:14.5px;line-height:1.22}.card-desc{margin:4px 0 0;color:#9fb2c7;font-size:11.5px;line-height:1.38}.pill{display:inline-flex;margin-top:5px;padding:3px 7px;border:1px solid rgba(32,216,255,.25);border-radius:999px;color:#83e9ff;font-size:9.5px;font-weight:800}.view{grid-column:1/-1;height:40px;border:0;border-radius:11px;background:linear-gradient(135deg,#06a8cb,#1479ff);color:#fff;font-weight:900}.empty{grid-column:1/-1;padding:18px 12px;border:1px dashed rgba(91,190,235,.32);border-radius:14px;background:rgba(6,25,41,.72);text-align:center;color:#9fb2c7;font-size:12px}.status-note{margin:8px 0 0;padding:9px 10px;border-radius:11px;background:rgba(117,35,41,.35);border:1px solid rgba(255,100,100,.32);color:#ffd3d3;font-size:11px;line-height:1.4}
    .drawer-bg{display:none;position:fixed;z-index:80;inset:0;background:rgba(0,5,10,.72)}.drawer-bg.show{display:block}.drawer{position:absolute;right:0;top:0;bottom:0;width:min(84vw,330px);padding:calc(14px + env(safe-area-inset-top)) 12px 18px;overflow:auto;background:#041421;border-left:1px solid rgba(68,205,255,.25);transform:translateX(100%);transition:.2s}.drawer-bg.show .drawer{transform:none}.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.drawer-title{font-size:18px;font-weight:900}.drawer-close{width:40px;height:40px;border:0;border-radius:11px;background:#10293f;color:#fff;font-size:20px}.drawer-list{display:grid;gap:7px}.drawer-item{min-height:46px;padding:8px 10px;border:1px solid rgba(70,205,255,.22);border-radius:12px;display:flex;align-items:center;justify-content:space-between;background:#081d2f;color:#fff;text-align:left}.drawer-item small{color:#8ba0b5}
    .bottom{position:fixed;z-index:70;left:0;right:0;bottom:0;height:calc(var(--bottom) + env(safe-area-inset-bottom));padding:6px 10px calc(6px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;background:rgba(2,12,22,.98);border-top:1px solid rgba(63,196,255,.22)}.nav{height:50px;border:1px solid rgba(75,195,250,.32);border-radius:15px;background:#081b2c;color:#b9eaff;font-size:11px;font-weight:860}.nav.home{border-color:transparent;background:linear-gradient(135deg,#05abc9,#1479ff);color:#fff}.nav span{display:block;font-size:17px;line-height:1.05}
    .loading{display:none;position:fixed;z-index:100;inset:0;align-items:center;justify-content:center;padding:20px;background:rgba(1,8,15,.72);backdrop-filter:blur(7px)}.loading.show{display:flex}.loading-card{width:min(280px,86vw);padding:20px;border:1px solid rgba(77,207,255,.28);border-radius:18px;background:#071827;text-align:center}.spinner{width:39px;height:39px;margin:0 auto 10px;border:4px solid #163b58;border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}.loading-title{font-size:16px;font-weight:900}.loading-text{margin-top:4px;color:#9fb2c7;font-size:11.5px;line-height:1.4}@keyframes spin{to{transform:rotate(360deg)}}
    .modal-bg{display:none;position:fixed;z-index:90;inset:0;padding:7px;overflow:auto;background:rgba(0,5,10,.9)}.modal-bg.show{display:grid;place-items:center}.modal{width:min(1000px,100%);overflow:hidden;border:1px solid rgba(75,201,255,.3);border-radius:16px;background:#04101b}.modal-head{display:flex;justify-content:space-between;gap:10px;padding:11px 12px}.close{width:40px;height:40px;border:0;border-radius:11px;background:#10293f;color:#fff;font-size:20px}.image-wrap{min-height:220px;max-height:78dvh;overflow:auto;display:grid;place-items:center;background:#02070c}.modal-image{max-width:100%;height:auto}.modal-foot{display:flex;justify-content:space-between;padding:9px 12px;color:#9fb2c7;font-size:10px}.action{height:36px;padding:0 10px;border:1px solid rgba(73,199,255,.27);border-radius:9px;display:inline-flex;align-items:center;background:#0b2338;color:#fff;font-weight:800;text-decoration:none}
    @media(min-width:700px){.hero{height:190px}.tiles{grid-template-columns:repeat(5,minmax(0,1fr))}.folders{grid-template-columns:repeat(4,minmax(0,1fr))}.protocols{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
  <header class="topbar"><div class="brand"><div class="logo">VT</div><div><div class="brand-title">Vet Tx Handbook</div><div class="brand-sub">by Dr. Ankit Malik</div></div></div><div class="top-actions"><button class="icon-btn" id="searchFocus" aria-label="Search">⌕</button><button class="icon-btn" id="menu" aria-label="Menu">☰</button></div></header>
  <main>
    <section class="hero no-image" id="hero"><img id="bannerImage" alt="Veterinary treatment banner" hidden><div class="hero-copy"><h1>Clinical Knowledge.<br>Better Care.</h1><p>Organ-system-wise veterinary treatment protocols</p></div></section>
    <div class="search"><span>⌕</span><input id="search" type="search" placeholder="Search disease, treatment, drug…"><button class="clear" id="clear">×</button></div>
    <section class="section"><div class="section-head"><h2 class="section-title">▦ ORGAN SYSTEMS</h2><span class="section-meta" id="organMeta">Loading…</span></div><div class="tiles" id="organs"></div><div class="status-note" id="statusNote" hidden></div></section>
    <section class="section" id="indicationSection"><div class="section-head"><h2 class="section-title orange">▰ INDICATION FOLDERS</h2><span class="section-meta" id="indicationMeta"></span></div><div class="folders" id="indications"></div></section>
    <section class="section"><div class="section-head"><h2 class="section-title" id="protocolHeading">Treatment Protocols</h2><span class="section-meta" id="protocolMeta"></span></div><div class="protocols" id="protocols"></div></section>
  </main>
  <nav class="bottom"><button class="nav" id="back"><span>←</span>Back</button><button class="nav home" id="home"><span>⌂</span>Home</button><button class="nav" id="forward"><span>→</span>Forward</button></nav>
  <div class="drawer-bg" id="drawerBg"><aside class="drawer"><div class="drawer-head"><div class="drawer-title">Browse folders</div><button class="drawer-close" id="drawerClose">×</button></div><div class="drawer-list" id="drawerList"></div></aside></div>
  <div class="loading show" id="loading"><div class="loading-card"><div class="spinner"></div><div class="loading-title" id="loadingTitle">Loading library</div><div class="loading-text" id="loadingText">Connecting to Google Sheet…</div></div></div>
  <div class="modal-bg" id="modal"><div class="modal"><div class="modal-head"><strong id="modalTitle"></strong><button class="close" id="modalClose">×</button></div><div class="image-wrap"><img class="modal-image" id="modalImage" alt="Treatment protocol"></div><div class="modal-foot"><span>Protocol image</span><a class="action" id="full" target="_blank" rel="noopener">Full size</a></div></div></div>
  <script>
    const $=id=>document.getElementById(id);const E={search:$('search'),clear:$('clear'),organs:$('organs'),indications:$('indications'),protocols:$('protocols'),organMeta:$('organMeta'),indicationMeta:$('indicationMeta'),protocolMeta:$('protocolMeta'),protocolHeading:$('protocolHeading'),statusNote:$('statusNote'),loading:$('loading'),loadingTitle:$('loadingTitle'),loadingText:$('loadingText'),bannerImage:$('bannerImage'),hero:$('hero'),drawerBg:$('drawerBg'),drawerList:$('drawerList'),modal:$('modal'),modalTitle:$('modalTitle'),modalImage:$('modalImage'),full:$('full')};
    const state={categories:[],protocols:[],selected:'',query:''};const API=String((window.VET_TX_CONFIG||{}).API_URL||'').replace(/\/$/,'');const fallbackNames=['Respiratory','Digestive / GIT','Mastitis / Udder','Reproductive / Gynae','Cardiovascular','Kidney / Urinary','Liver / Hepatic','Nervous System','Skin / Dermatology','Eye','Ear','Musculoskeletal'];
    const esc=v=>String(v||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));const attr=v=>esc(v).replace(/'/g,'&#39;');const initials=v=>String(v||'OS').split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase();const driveThumb=id=>id?'https://drive.google.com/thumbnail?id='+encodeURIComponent(id)+'&sz=w800':'';const show=(t,x)=>{E.loadingTitle.textContent=t;E.loadingText.textContent=x;E.loading.classList.add('show')};const hide=()=>E.loading.classList.remove('show');
    function jsonp(action){return new Promise((resolve,reject)=>{const cb='vtx_'+Date.now()+'_'+Math.floor(Math.random()*9999),s=document.createElement('script');let done=false,timer;window[cb]=data=>{done=true;clearTimeout(timer);delete window[cb];s.remove();resolve(data)};s.onerror=()=>{if(done)return;clearTimeout(timer);delete window[cb];s.remove();reject(new Error('Connection failed'))};s.src=API+'?api='+action+'&callback='+cb+'&_='+Date.now();document.head.appendChild(s);timer=setTimeout(()=>{if(done)return;delete window[cb];s.remove();reject(new Error('Server timeout'))},18000)})}
    async function load(){show('Loading library','Reading published folders and protocols…');for(const action of ['initial','library','public']){try{const data=await jsonp(action);if(data&&data.ok!==false){apply(data);hide();return}if(data&&/Unknown API action/i.test(data.error||''))continue}catch(e){}}showFallback();hide()}
    function apply(data){state.categories=Array.isArray(data.categories)?data.categories:[];state.protocols=Array.isArray(data.protocols)?data.protocols:[];if(state.categories.length&&typeof state.categories[0]==='string')state.categories=state.categories.map(name=>({name,type:'Organ System'}));state.selected=(state.categories.find(c=>String(c.type||'').toLowerCase().indexOf('indication')<0)||{}).name||'';const b=data.banner||{},src=b.imageUrl||b.thumbnailUrl||driveThumb(b.fileId);if(src){E.bannerImage.src=src;E.bannerImage.hidden=false;E.hero.classList.remove('no-image');E.bannerImage.onerror=()=>{E.bannerImage.hidden=true;E.hero.classList.add('no-image')}}renderAll()}
    function showFallback(){state.categories=fallbackNames.map(name=>({name,type:'Organ System'}));state.protocols=[];state.selected=fallbackNames[0];E.statusNote.hidden=false;E.statusNote.textContent='Backend deployment is still serving the old code. Update Code.gs and deploy a new Web App version; folder names are shown as a preview.';renderAll()}
    function split(){return{organs:state.categories.filter(c=>String(c.type||'Organ System').toLowerCase().indexOf('indication')<0),inds:state.categories.filter(c=>String(c.type||'').toLowerCase().indexOf('indication')>=0)}}
    function count(name){return state.protocols.filter(p=>p.organSystem===name).length}function image(c){return c.thumbnailUrl||driveThumb(c.thumbnailFileId)||''}
    function renderAll(){const s=split();E.organMeta.textContent=s.organs.length+' systems';E.indicationMeta.textContent=s.inds.length?s.inds.length+' folders':'';E.organs.innerHTML=s.organs.map(c=>`<button class="tile ${c.name===state.selected&&!state.query?'active':''}" data-cat="${attr(c.name)}"><div class="tile-media">${image(c)?`<img src="${attr(image(c))}" alt="${attr(c.name)}">`:`<span class="initials">${esc(initials(c.name))}</span>`}</div><div class="tile-name">${esc(c.name)}</div><span class="tile-count">${count(c.name)}</span></button>`).join('');E.indications.innerHTML=s.inds.map(c=>`<button class="folder" data-cat="${attr(c.name)}"><span class="folder-thumb">${image(c)?`<img src="${attr(image(c))}" alt="">`:'📁'}</span><span class="folder-name">${esc(c.name)}</span><span class="folder-count">${count(c.name)}</span></button>`).join('');$('indicationSection').hidden=!s.inds.length;document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>select(b.dataset.cat));renderDrawer();renderProtocols()}
    function renderDrawer(){E.drawerList.innerHTML=state.categories.map(c=>`<button class="drawer-item" data-drawer="${attr(c.name)}"><span>${esc(c.name)}</span><small>${count(c.name)}</small></button>`).join('');document.querySelectorAll('[data-drawer]').forEach(b=>b.onclick=()=>{select(b.dataset.drawer);closeDrawer()})}
    function select(name){show('Opening folder','Preparing '+name+'…');state.selected=name;state.query='';E.search.value='';E.clear.classList.remove('show');history.pushState({category:name},'',location.pathname+'#'+encodeURIComponent(name));renderAll();setTimeout(()=>{hide();document.querySelector('.protocols').scrollIntoView({behavior:'smooth',block:'start'})},120)}
    function filtered(){const q=state.query.trim().toLowerCase();return state.protocols.filter(p=>q?[p.title,p.description,p.tags,p.organSystem].join(' ').toLowerCase().includes(q):p.organSystem===state.selected)}
    function renderProtocols(){const rows=filtered(),q=state.query.trim();E.protocolHeading.textContent=q?'Search Results':(state.selected||'Treatment Protocols');E.protocolMeta.textContent=rows.length+' result'+(rows.length===1?'':'s');E.protocols.innerHTML=rows.map(p=>`<article class="card"><div class="card-media"><img src="${attr(p.thumbnailUrl||p.imageUrl||'')}" alt="${attr(p.title)}"></div><div><h3 class="card-title">${esc(p.title)}</h3><p class="card-desc">${esc(p.description)}</p>${q?`<span class="pill">${esc(p.organSystem)}</span>`:''}</div><button class="view" data-view="${attr(p.id)}">View Protocol</button></article>`).join('')||`<div class="empty">${state.protocols.length?'No protocols found in this folder.':'No published protocol data received yet.'}</div>`;document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>openProtocol(state.protocols.find(p=>p.id===b.dataset.view)))}
    function openProtocol(p){if(!p)return;show('Opening protocol','Loading image…');E.modalTitle.textContent=p.title;E.full.href=p.driveFileId?'https://drive.google.com/file/d/'+p.driveFileId+'/view':p.imageUrl||'#';E.modalImage.onload=()=>{hide();E.modal.classList.add('show')};E.modalImage.onerror=()=>{hide();E.modal.classList.add('show')};E.modalImage.src=p.imageUrl||p.thumbnailUrl||''}
    function closeDrawer(){E.drawerBg.classList.remove('show')}function home(){state.query='';E.search.value='';E.clear.classList.remove('show');state.selected=(split().organs[0]||{}).name||'';renderAll();window.scrollTo({top:0,behavior:'smooth'})}
    let st;E.search.oninput=()=>{clearTimeout(st);const v=E.search.value;E.clear.classList.toggle('show',!!v);st=setTimeout(()=>{state.query=v;renderProtocols()},140)};E.clear.onclick=()=>{E.search.value='';state.query='';E.clear.classList.remove('show');renderProtocols()};$('searchFocus').onclick=()=>E.search.focus();$('menu').onclick=()=>E.drawerBg.classList.add('show');$('drawerClose').onclick=closeDrawer;E.drawerBg.onclick=e=>{if(e.target===E.drawerBg)closeDrawer()};$('home').onclick=home;$('back').onclick=()=>history.back();$('forward').onclick=()=>history.forward();$('modalClose').onclick=()=>E.modal.classList.remove('show');E.modal.onclick=e=>{if(e.target===E.modal)E.modal.classList.remove('show')};window.onpopstate=()=>{const h=decodeURIComponent(location.hash.slice(1));if(h)state.selected=h;renderAll()};load();
  </script>
</body>
</html>
